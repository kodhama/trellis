name: eval-scorecard-sync
# The eval invariant scorecard is derived from the catalog (decision-0028); keep it in sync.
on:
  pull_request:
    paths:
      - core/catalog/**
      - eval/experiments/does-trellis-help/scorecards/invariants.md
      - eval/experiments/does-trellis-help/gen-invariant-scorecard.py
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./eval/experiments/does-trellis-help/check-scorecard.sh
