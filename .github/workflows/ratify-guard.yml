name: ratify-guard

# decision-0042 (family lifecycle, amending decision-0022/0028): merge = ratification,
# and the mergeable state is `gated` — a decision/spec must not land on main still
# `draft`, and a *new* artifact must not arrive already `approved` (approval is recorded
# by a post-merge bump, never written into the PR that ships the artifact). This fails a
# *ready* PR on either count. Draft PRs are exempt: marking a PR as draft is the
# sanctioned "keep it clearly WIP" escape.
#
# It checks only the files the PR touches (not pre-existing state elsewhere), so it
# catches the drift at the point it's introduced without failing on unrelated state.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

jobs:
  ratify-guard:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fail on a draft or self-approved decision/spec in a ready PR
        run: |
          set -eu
          git fetch origin "${{ github.base_ref }}" --quiet
          changed="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- 'decisions/*.md' 'specs/*.md' || true)"
          added="$(git diff --name-only --diff-filter=A "origin/${{ github.base_ref }}...HEAD" -- 'decisions/*.md' 'specs/*.md' || true)"
          bad=""
          for f in $changed; do
            [ -f "$f" ] || continue   # deleted in the PR
            if grep -q '^status: draft' "$f"; then bad="$bad $f"; fi
          done
          if [ -n "$bad" ]; then
            echo "::error::This PR is ready to merge but touches decisions/specs still marked 'status: draft'."
            echo "merge=ratify (decision-0042): flip them to 'gated' in this PR, or convert the PR to a draft to keep them WIP."
            for f in $bad; do echo "  · $f"; done
            exit 1
          fi
          selfapproved=""
          for f in $added; do
            [ -f "$f" ] || continue
            if grep -q '^status: approved' "$f"; then selfapproved="$selfapproved $f"; fi
          done
          if [ -n "$selfapproved" ]; then
            echo "::error::This PR adds new decisions/specs already marked 'status: approved'."
            echo "approval is the merge (decision-0042): ship them 'gated'; a post-merge bump records 'approved'."
            for f in $selfapproved; do echo "  · $f"; done
            exit 1
          fi
          echo "ok — nothing un-gated or self-approved introduced by this ready PR"
