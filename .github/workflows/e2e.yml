name: e2e (on request)

# The model-in-the-loop e2e (real M2 morph + a judge model) — DEFAULT-OFF and
# manual: it spends tokens on the account behind CLAUDE_CODE_OAUTH_TOKEN, so it
# only runs when someone triggers it from the Actions tab.
#
# Uses the same auth secret as the review workflow (decision 0007). The test
# (TestE2E_M2_RealMorphJudged) is gated on TRELLIS_E2E_MODEL, which this workflow
# sets from the input; without it, `go test` skips it.

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Model tier for the morph + judge"
        type: choice
        options: [sonnet, opus, haiku]
        default: sonnet

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # The claude CLI reads its auth from these; set whichever your repo has.
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TRELLIS_E2E_MODEL: ${{ inputs.model }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false
      - name: Install the Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Verify claude is present
        run: claude --version
      - name: Run the model-in-the-loop e2e
        working-directory: cli
        run: go test -run 'TestE2E_M2_RealMorphJudged' -v -timeout 15m ./...
