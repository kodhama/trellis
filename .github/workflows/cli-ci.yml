name: cli-ci

# Build + vet + test the Go setup CLI (decision-0023). This is the verification the
# maintainer's environment relies on — the code is authored where `go` isn't installed,
# so a green run here is what proves it builds and its tests pass.

# Paths include the doc surfaces (docs/, README, install.sh, plugins/) so the
# docs-consistency test (decision-0025) runs when a doc claim changes, not only on
# code changes.
on:
  pull_request:
    paths: ["cli/**", "docs/**", "README.md", "install.sh", "plugins/**", "core/catalog/**", ".github/workflows/cli-ci.yml"]
  push:
    branches: [main]
    paths: ["cli/**", "docs/**", "README.md", "install.sh", "plugins/**", "core/catalog/**", ".github/workflows/cli-ci.yml"]

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false  # stdlib-only for now; enable when the first dependency lands
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
