name: release

# On a version tag, build the setup CLI for every supported OS/arch and publish
# them to a GitHub Release. The asset names match what install.sh downloads
# (trellis_<os>_<arch>), so `curl … | sh` works with no package manager.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false
      - name: Build binaries
        working-directory: cli
        run: |
          set -eu
          mkdir -p dist
          version="${GITHUB_REF_NAME}"
          for os in darwin linux; do
            for arch in amd64 arm64; do
              GOOS="$os" GOARCH="$arch" go build \
                -ldflags "-X main.version=${version}" \
                -o "dist/trellis_${os}_${arch}" .
            done
          done
          ls -la dist
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" cli/dist/trellis_* --title "${GITHUB_REF_NAME}" --generate-notes
